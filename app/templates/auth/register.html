{% extends 'base.html' %}
{% block title %}สมัครสมาชิก{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <div style="font-size:3rem;"></div>
            <h3 class="page-title">สมัครสมาชิก</h3>
            <p style="color:var(--text-muted);">สร้างบัญชีใหม่</p>
        </div>
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"> ชื่อผู้ใช้</label>
                    <input type="text" name="username"
                           class="form-control" placeholder="ตั้งชื่อผู้ใช้" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"> อีเมล</label>
                    <input type="email" name="email"
                           class="form-control" placeholder="example@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label"> รหัสผ่าน</label>
                    <input type="password" name="password"
                           class="form-control" placeholder="ตั้งรหัสผ่าน" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    สมัครสมาชิก →
                </button>
            </form>
            <hr class="glow-divider">
            <p class="text-center mb-0" style="color:var(--text-muted); font-size:.9rem;">
                มีบัญชีแล้ว?
                <a href="{{ url_for('auth.login') }}"
                   style="color:var(--blue-primary);">เข้าสู่ระบบ</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
