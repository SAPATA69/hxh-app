{% extends 'base.html' %}
{% block title %}แก้ไขตัวละคร{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="page-title mb-4">✏️ แก้ไข: {{ character.name }}</h3>
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">ชื่อตัวละคร *</label>
                    <input type="text" name="name" value="{{ character.name }}"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">สายเน็น *</label>
                    <select name="nen_type_en" class="form-select" required>
                        {% for en, th in nen_types %}
                        <option value="{{ en }}" {% if character.nen_type_en == en %}selected{% endif %}>
                            {{ th }} ({{ en }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">ความสามารถหลัก</label>
                    <input type="text" name="ability" value="{{ character.ability or '' }}"
                           class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label">รายละเอียด</label>
                    <textarea name="description" rows="3"
                              class="form-control">{{ character.description or '' }}</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill py-2">💾 บันทึก</button>
                    <a href="{{ url_for('characters.index') }}"
                       class="btn btn-outline-secondary flex-fill py-2">ยกเลิก</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
