{% extends 'base.html' %}
{% block title %}เพิ่มตัวละคร{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="page-title mb-4">➕ เพิ่มตัวละครใหม่</h3>
        <div class="card p-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">ชื่อตัวละคร *</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="เช่น Gon Freecss" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">สายเน็น *</label>
                    <select name="nen_type_en" class="form-select" required>
                        <option value="">-- เลือกสายเน็น --</option>
                        {% for en, th in nen_types %}
                        <option value="{{ en }}">{{ th }} ({{ en }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">ความสามารถหลัก</label>
                    <input type="text" name="ability" class="form-control"
                           placeholder="เช่น Jajanken, Godspeed">
                </div>
                <div class="mb-3">
                    <label class="form-label">รายละเอียด</label>
                    <textarea name="description" rows="3" class="form-control"
                              placeholder="อธิบายตัวละครเพิ่มเติม..."></textarea>
                </div>

                <!-- ช่องอัปโหลดรูป -->
                <div class="mb-4">
                    <label class="form-label"> รูปภาพตัวละคร</label>
                    <input type="file" name="image" id="imageInput"
                           class="form-control" accept="image/*"
                           onchange="previewImage(this)">
                    <div id="preview" class="mt-2 text-center" style="display:none;">
                        <img id="previewImg" src=""
                             style="max-height:200px; border-radius:10px; border:1px solid var(--border-color);">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill py-2"> บันทึก</button>
                    <a href="{{ url_for('characters.index') }}"
                       class="btn btn-outline-secondary flex-fill py-2">ยกเลิก</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function previewImage(input) {
    const preview = document.getElementById('preview');
    const img = document.getElementById('previewImg');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            img.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
