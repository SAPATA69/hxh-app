{% extends 'base.html' %}
{% block title %}เพิ่มตัวละคร{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <h3 class="page-title mb-4"> เพิ่มตัวละครใหม่</h3>
        <div class="card p-4">
            <form method="POST" enctype="multipart/form-data">

                <!-- ── ข้อมูลพื้นฐาน ── -->
                <div class="section-label mb-3" style="color:#7ec8ff; font-size:.85rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase;">
                    ข้อมูลพื้นฐาน
                </div>

                <div class="mb-3">
                    <label class="form-label">ชื่อตัวละคร *</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="เช่น Gon Freecss" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">สายเน็น *</label>
                    <select name="nen_type_en" id="nenSelect" class="form-select" required
                            onchange="showNenUsage(this.value)">
                        <option value="">-- เลือกสายเน็น --</option>
                        {% for en, th in nen_types %}
                        <option value="{{ en }}">{{ th }} ({{ en }})</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Nen % bars -->
                <div id="nenUsageBox" class="mb-3 p-3"
                     style="display:none; background:#060e1e; border-radius:10px;
                            border:1px solid var(--border-color);">
                    <p class="mb-2" style="color:var(--text-muted); font-size:.82rem;">
                         อัตราการใช้สายเน็นอื่น:
                    </p>
                    <div id="nenBars"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">ความสามารถหลัก</label>
                    <input type="text" name="ability" class="form-control"
                           placeholder="เช่น Jajanken, Godspeed">
                </div>

                <div class="mb-3">
                    <label class="form-label">รายละเอียดย่อ</label>
                    <textarea name="description" rows="2" class="form-control"
                              placeholder="สรุปตัวละครสั้นๆ (แสดงบนการ์ด)"></textarea>
                </div>

                <hr class="glow-divider">

                <!-- ── รูปภาพ ── -->
                <div class="section-label mb-3" style="color:#7ec8ff; font-size:.85rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase;">
                    รูปภาพ
                </div>

                <div class="mb-3">
                    <label class="form-label"> รูปหลักของตัวละคร</label>
                    <input type="file" name="image" id="imageInput"
                           class="form-control" accept="image/*"
                           onchange="previewMain(this)">
                    <div id="mainPreview" class="mt-2 text-center" style="display:none;">
                        <img id="mainPreviewImg" src=""
                             style="max-height:200px; border-radius:10px; border:1px solid var(--border-color);">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label"> แกลเลอรี่รูปภาพ
                        <span style="color:var(--text-muted); font-weight:400;">(สูงสุด 5 รูป)</span>
                    </label>
                    <input type="file" name="gallery_images" id="galleryInput"
                           class="form-control" accept="image/*" multiple
                           onchange="previewGallery(this)">
                    <small style="color:var(--text-muted);">เลือกได้หลายรูปพร้อมกัน (กด Ctrl/Cmd ค้างไว้)</small>
                    <div id="galleryPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                </div>

                <hr class="glow-divider">

                <!-- ── ประวัติ ── -->
                <div class="section-label mb-3" style="color:#7ec8ff; font-size:.85rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase;">
                    ประวัติตัวละคร
                </div>

                <div class="mb-4">
                    <label class="form-label"> ประวัติและรายละเอียด</label>
                    <textarea name="biography" rows="10" class="form-control"
                              placeholder="เขียนประวัติตัวละครแบบยาวๆ ได้เลยครับ...
เช่น ภูมิหลัง, เรื่องราวในอนิเมะ, ความสามารถพิเศษ, ความสัมพันธ์กับตัวละครอื่น ฯลฯ"></textarea>
                    <small style="color:var(--text-muted);">รองรับการขึ้นบรรทัดใหม่</small>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill py-2">💾 บันทึก</button>
                    <a href="{{ url_for('characters.index') }}"
                       class="btn btn-outline-secondary flex-fill py-2">ยกเลิก</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
const NEN_USAGE = {{ nen_usage | tojson }};
const NEN_COLORS = {
    'Enhancement': '#4caf50', 'Emission': '#1e90ff',
    'Transmutation': '#ffc107', 'Conjuration': '#ab47bc',
    'Manipulation': '#ff8c42', 'Specialization': '#ef5350',
};

function showNenUsage(type) {
    const box = document.getElementById('nenUsageBox');
    const bars = document.getElementById('nenBars');
    if (!type || !NEN_USAGE[type]) { box.style.display = 'none'; return; }
    const usage = NEN_USAGE[type];
    const color = NEN_COLORS[type] || '#1e90ff';
    let html = '';
    for (const [name, pct] of Object.entries(usage)) {
        html += `
        <div class="mb-2">
            <div class="d-flex justify-content-between mb-1">
                <small style="color:var(--text-muted); font-size:.78rem;">${name}</small>
                <small style="color:${color}; font-weight:600; font-size:.78rem;">${pct}%</small>
            </div>
            <div style="background:#0a1525; border-radius:4px; height:6px; overflow:hidden;">
                <div style="width:${pct}%; height:100%; background:${color};
                            border-radius:4px; box-shadow:0 0 6px ${color}88; transition:width .5s ease;"></div>
            </div>
        </div>`;
    }
    bars.innerHTML = html;
    box.style.display = 'block';
}

function previewMain(input) {
    const preview = document.getElementById('mainPreview');
    const img = document.getElementById('mainPreviewImg');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => { img.src = e.target.result; preview.style.display = 'block'; };
        reader.readAsDataURL(input.files[0]);
    }
}

function previewGallery(input) {
    const container = document.getElementById('galleryPreview');
    container.innerHTML = '';
    const files = Array.from(input.files).slice(0, 5);
    if (files.length > 5) {
        alert('เลือกได้สูงสุด 5 รูปครับ ระบบจะใช้แค่ 5 รูปแรก');
    }
    files.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = e => {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'position:relative; display:inline-block;';
            wrap.innerHTML = `
                <img src="${e.target.result}"
                     style="width:80px; height:80px; object-fit:cover; border-radius:8px;
                            border:1px solid var(--border-color);">
                <span style="position:absolute; top:-6px; right:-6px; background:#1e90ff;
                             color:#fff; font-size:.65rem; width:18px; height:18px;
                             border-radius:50%; display:flex; align-items:center; justify-content:center;
                             font-weight:700;">${idx + 1}</span>
            `;
            container.appendChild(wrap);
        };
        reader.readAsDataURL(file);
    });
}
</script>
{% endblock %}
