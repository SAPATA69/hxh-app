<div class="card-body">
    <!-- เพิ่มรูปตรงนี้ -->
    {% if char.image %}
    <div class="text-center mb-3">
        <img src="{{ char.image }}"
             style="width:100%; max-height:180px; object-fit:cover; border-radius:8px;">
    </div>
    {% else %}
    <div class="text-center mb-3" style="height:100px; background:#0a1525;
         border-radius:8px; display:flex; align-items:center; justify-content:center;">
        <span style="font-size:3rem; opacity:.3;"></span>
    </div>
    {% endif %}

    <h5 class="fw-bold mb-2" style="color:#7ec8ff;">{{ char.name }}</h5>
    <span class="nen-badge nen-{{ char.nen_type_en | lower }} mb-3 d-inline-block">
        {{ char.nen_type_th }} · {{ char.nen_type_en }}
    </span>
    {% if char.ability %}
    <p class="small mb-1" style="color:#ffc107;"> {{ char.ability }}</p>
    {% endif %}
    {% if char.description %}
    <p class="small mb-0" style="color:var(--text-muted);">
        {{ char.description | truncate(80) }}
    </p>
    {% endif %}
</div>
